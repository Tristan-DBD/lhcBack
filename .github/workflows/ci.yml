name: Test CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: appCoaching_api
          POSTGRES_PASSWORD: 1234
          POSTGRES_DB: appCoaching_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U appCoaching_api"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup test environment
        run: |
          echo "DATABASE_URL=postgresql://appCoaching_api:1234@localhost:5432/appCoaching_db" > .env.test
          echo "NODE_ENV=test" >> .env.test
          echo "PORT=3000" >> .env.test

      - name: Setup database
        run: npm run migrate:test

      - name: Run tests
        run: npm run test:ci
